<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zero2Earn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">A</div>
      <div>
        <div class="logo">Admin<span>Panel</span></div>
        <div class="tagline">Zero2Earn SaaS control room</div>
      </div>
    </div>

    <div class="nav">
      <button onclick="loadAdmin()" class="active">Dashboard</button>
      <button onclick="loadRevenue()">Revenue</button>
      <button onclick="loadLeads()">Partner Leads</button>
      <button onclick="loadUsers()">Users</button>
      <button onclick="window.location.href='app.html'">User App</button>
      <button onclick="window.location.href='index.html'">Website</button>
    </div>

    <div class="sidebar-panel">
      <b>Founder View</b>
      <p class="small muted">Track users, payments, leads and growth.</p>
      <span class="badge gold">Revenue Live</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="title">
        <span class="kicker">Zero2Earn SaaS</span>
        <h1 id="pageTitle">Admin Dashboard</h1>
        <p id="pageSub">Business command center</p>
      </div>

      <div class="auth-card">
        <button onclick="loadAdmin()">Refresh</button>
      </div>
    </div>

    <div id="content"></div>

    <footer>Zero2Earn Admin — users, payments, revenue, leads and growth.</footer>
  </main>
</div>

<script>
const API = "https://zero2earn.onrender.com";

function setContent(html){
  document.getElementById("content").innerHTML = html;
}

async function getJSON(path){
  const res = await fetch(API + path);
  return await res.json();
}

async function loadAdmin(){
  document.getElementById("pageTitle").innerText = "Revenue Intelligence";
  document.getElementById("pageSub").innerText = "Founder business command center";

  const d = await getJSON("/api/admin/stats");

  setContent(`
    <section class="card hero">
      <div class="hero-content">
        <h2>Zero2Earn Growth Cockpit</h2>
        <p>Monitor users, Pro conversion, payments, applications and partner pipeline.</p>
        <span class="badge">Founder dashboard</span>
        <span class="badge blue">SaaS metrics</span>
        <span class="badge gold">Revenue live</span>
      </div>
    </section>

    <div class="grid">
      <div class="metric"><h2>${d.total_users}</h2><p>Total users</p></div>
      <div class="metric"><h2>${d.pro_users}</h2><p>Pro users</p></div>
      <div class="metric"><h2>Rs.${d.mrr}</h2><p>MRR</p></div>
      <div class="metric"><h2>Rs.${d.arpu}</h2><p>ARPU</p></div>
      <div class="metric"><h2>${d.conversion_rate}%</h2><p>Free → Pro</p></div>
      <div class="metric"><h2>${d.partner_leads}</h2><p>Partner leads</p></div>
    </div>

    <div class="card">
      <h2>Founder Actions</h2>
      <div class="item">1. Push 50 beta users through Resume First.</div>
      <div class="item">2. Convert serious users to Pro at Rs.499/month.</div>
      <div class="item">3. Contact colleges and companies from Partner Leads.</div>
      <div class="item">4. Improve jobs matching based on resume keywords.</div>
    </div>
  `);
}

async function loadRevenue(){
  document.getElementById("pageTitle").innerText = "Revenue";
  document.getElementById("pageSub").innerText = "Payments and Pro unlocks";

  const d = await getJSON("/api/admin/payments");

  let html = `
    <section class="card hero">
      <div class="hero-content">
        <h2>Payment Ledger</h2>
        <p>Track Razorpay orders, paid users and revenue movement.</p>
      </div>
    </section>

    <div class="card">
      <h2>Payments</h2>
  `;

  if(!d.items || d.items.length === 0){
    html += `<p class="muted">No payments yet.</p>`;
  } else {
    d.items.forEach(p => {
      html += `
        <div class="item">
          <h3>Rs.${p.amount_rupees}</h3>
          <span class="badge">${p.status}</span>
          <span class="badge blue">User ${p.user_id}</span>
          <p class="muted">${p.razorpay_order_id || ""}</p>
          <p class="muted">${p.razorpay_payment_id || ""}</p>
        </div>
      `;
    });
  }

  html += `</div>`;
  setContent(html);
}

async function loadLeads(){
  document.getElementById("pageTitle").innerText = "Partner Leads";
  document.getElementById("pageSub").innerText = "College/company interest pipeline";

  const d = await getJSON("/api/admin/leads");

  let html = `
    <section class="card hero">
      <div class="hero-content">
        <h2>Partner Lead Pipeline</h2>
        <p>Colleges, companies and training partners who showed interest.</p>
      </div>
    </section>

    <div class="card">
      <h2>Leads</h2>
  `;

  if(!d.items || d.items.length === 0){
    html += `<p class="muted">No leads yet.</p>`;
  } else {
    d.items.forEach(l => {
      html += `
        <div class="item">
          <h3>${l.name}</h3>
          <p>${l.email}</p>
          <span class="badge">${l.organization}</span>
          <span class="badge blue">${l.lead_type}</span>
          <p class="muted">${l.created_at}</p>
        </div>
      `;
    });
  }

  html += `</div>`;
  setContent(html);
}

async function loadUsers(){
  document.getElementById("pageTitle").innerText = "Users";
  document.getElementById("pageSub").innerText = "Registered user base";

  const d = await getJSON("/api/admin/users");

  let html = `
    <section class="card hero">
      <div class="hero-content">
        <h2>User Base</h2>
        <p>People using Zero2Earn and their earning tracks.</p>
      </div>
    </section>

    <div class="card">
      <h2>Users</h2>
  `;

  if(!d.items || d.items.length === 0){
    html += `<p class="muted">No users found.</p>`;
  } else {
    d.items.forEach(u => {
      html += `
        <div class="item">
          <h3>${u.name || "User"}</h3>
          <p>${u.email || ""}</p>
          <span class="badge">ID: ${u.id}</span>
          <span class="badge blue">${u.track || "No track"}</span>
          <span class="badge gold">${u.plan || "free"}</span>
        </div>
      `;
    });
  }

  html += `</div>`;
  setContent(html);
}

loadAdmin();
</script>
</body>
</html>
